name: Deploy Aura Reface to Linux Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DEPLOY_ROOT: /home/abd/WebSites/aura-reface
  BACKEND_PORT: "9075"
  FRONTEND_PORT: "9076"

jobs:
  deploy:
    name: Deploy Aura Reface
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Next.js app
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
        run: npm run build

      - name: Build backend (if exists)
        working-directory: ./backend
        run: |
          if [ -f "package.json" ]; then
            npm install --legacy-peer-deps
            npm run build
          else
            echo "No backend folder found, skipping backend build"
          fi

      - name: Create directories on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            mkdir -p /home/abd/WebSites/aura-reface/frontend
            mkdir -p /home/abd/WebSites/aura-reface/backend
            mkdir -p /home/abd/WebSites/aura-reface/logs

      - name: Deploy frontend app to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: ".next/**,public/**,package.json,package-lock.json,next.config.mjs,prisma/**,middleware.ts"
          target: "${{ env.DEPLOY_ROOT }}/frontend"
          rm: false
          overwrite: true

      - name: Deploy backend app to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: "backend/dist/**,backend/package.json,backend/package-lock.json"
          target: "${{ env.DEPLOY_ROOT }}/backend"
          strip_components: 1
          rm: false
          overwrite: true

      - name: Install dependencies and setup env on server
        uses: appleboy/ssh-action@v1.0.3
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_ID: ${{ secrets.STRIPE_PRICE_ID }}
          BACKEND_PORT: ${{ env.BACKEND_PORT }}
          FRONTEND_PORT: ${{ env.FRONTEND_PORT }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          envs: DATABASE_URL,NEXTAUTH_SECRET,NEXTAUTH_URL,STRIPE_SECRET_KEY,STRIPE_WEBHOOK_SECRET,STRIPE_PRICE_ID,BACKEND_PORT,FRONTEND_PORT
          script: |
            set -e

            cd /home/abd/WebSites/aura-reface/frontend
            npm install --legacy-peer-deps --production
            npx prisma generate

            cat > .env << ENVEOF
            DATABASE_URL=${DATABASE_URL}
            NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
            NEXTAUTH_URL=${NEXTAUTH_URL}
            STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
            STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
            STRIPE_PRICE_ID=${STRIPE_PRICE_ID}
            PORT=${FRONTEND_PORT}
            ENVEOF

            if [ -f "/home/abd/WebSites/aura-reface/backend/package.json" ]; then
              cd /home/abd/WebSites/aura-reface/backend
              npm install --legacy-peer-deps --production

              cat > .env << ENVEOF
              DATABASE_URL=${DATABASE_URL}
              PORT=${BACKEND_PORT}
              NODE_ENV=production
              ENVEOF
            fi

      - name: Run Prisma migrations
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e
            cd /home/abd/WebSites/aura-reface/frontend
            npx prisma migrate deploy
            echo "Prisma migrations applied."

      - name: Setup and restart frontend and backend services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            BACKEND_PORT=9075
            FRONTEND_PORT=9076
            DEPLOY_ROOT=/home/abd/WebSites/aura-reface

            echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S -p '' ufw allow ${BACKEND_PORT}/tcp comment 'Aura Reface Backend' 2>/dev/null || true
            echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S -p '' ufw allow ${FRONTEND_PORT}/tcp comment 'Aura Reface Frontend' 2>/dev/null || true

            echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S -p '' systemctl stop aura-reface-frontend.service 2>/dev/null || true
            echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S -p '' systemctl stop aura-reface-backend.service 2>/dev/null || true

            NODE_PATH=$(which node)

            cat > /tmp/aura-reface-frontend.service << EOFSERVICE
            [Unit]
            Description=Aura Reface Frontend Service (Next.js)
            After=network.target

            [Service]
            Type=simple
            User=abd
            Group=abd
            WorkingDirectory=${DEPLOY_ROOT}/frontend
            EnvironmentFile=${DEPLOY_ROOT}/frontend/.env
            Environment=NODE_ENV=production
            Environment=PORT=${FRONTEND_PORT}
            ExecStart=${NODE_PATH} node_modules/.bin/next start -p ${FRONTEND_PORT}
            Restart=always
            RestartSec=10
            StandardOutput=journal
            StandardError=journal

            [Install]
            WantedBy=multi-user.target
            EOFSERVICE

            echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S -p '' cp /tmp/aura-reface-frontend.service /etc/systemd/system/aura-reface-frontend.service
            rm -f /tmp/aura-reface-frontend.service

            if [ -f "/home/abd/WebSites/aura-reface/backend/package.json" ]; then
              cat > /tmp/aura-reface-backend.service << EOFSERVICE
            [Unit]
            Description=Aura Reface Backend Service
            After=network.target

            [Service]
            Type=simple
            User=abd
            Group=abd
            WorkingDirectory=${DEPLOY_ROOT}/backend
            EnvironmentFile=${DEPLOY_ROOT}/backend/.env
            Environment=NODE_ENV=production
            Environment=PORT=${BACKEND_PORT}
            ExecStart=/bin/bash -lc 'if npm run | grep -q "start:prod"; then npm run start:prod; elif npm run | grep -q "start"; then npm run start; else node server.js; fi'
            Restart=always
            RestartSec=10
            StandardOutput=journal
            StandardError=journal

            [Install]
            WantedBy=multi-user.target
            EOFSERVICE

              echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S -p '' cp /tmp/aura-reface-backend.service /etc/systemd/system/aura-reface-backend.service
              rm -f /tmp/aura-reface-backend.service
            fi

            echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S -p '' systemctl daemon-reload
            echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S -p '' systemctl enable aura-reface-frontend.service
            echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S -p '' systemctl restart aura-reface-frontend.service || \
            echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S -p '' systemctl start aura-reface-frontend.service

            if [ -f "/home/abd/WebSites/aura-reface/backend/package.json" ]; then
              echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S -p '' systemctl enable aura-reface-backend.service
              echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S -p '' systemctl restart aura-reface-backend.service || \
              echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S -p '' systemctl start aura-reface-backend.service
            fi

      - name: Ensure Cloudflare tunnel is running
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S -p '' systemctl enable aura-reface-tunnel 2>/dev/null || true
            echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S -p '' systemctl restart aura-reface-tunnel || \
            echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S -p '' systemctl start aura-reface-tunnel || true

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            BACKEND_PORT=9075
            FRONTEND_PORT=9076
            sleep 5
            echo "=== Aura Reface Backend (${BACKEND_PORT}) ==="
            curl -sf http://localhost:${BACKEND_PORT} || echo "Backend health check failed"

            echo "=== Aura Reface Frontend (${FRONTEND_PORT}) ==="
            curl -sf http://localhost:${FRONTEND_PORT} || echo "Frontend health check failed"

            echo "=== Tunnel Status ==="
            sudo systemctl status aura-reface-tunnel --no-pager | head -10 || true
