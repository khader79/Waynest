name: Deploy to Linux Server

on:
  push:
    branches:
      - main  # أو master حسب فرعك
  workflow_dispatch:  # للتنفيذ اليدوي

jobs:
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: waynest-FE/package-lock.json

      - name: Install dependencies
        working-directory: ./waynest-FE
        run: npm ci

      - name: Build frontend
        working-directory: ./waynest-FE
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_GOOGLE_PLACES_KEY: ${{ secrets.VITE_GOOGLE_PLACES_KEY }}
        run: npm run build

      - name: Create directories
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            mkdir -p /home/abd/WebSites/Waynest/frontend
            mkdir -p /home/abd/WebSites/Waynest/backend
            mkdir -p /home/abd/WebSites/Waynest/logs
            mkdir -p /home/abd/WebSites/Waynest/backups

      - name: Deploy frontend to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: "waynest-FE/dist/*"
          target: "/home/abd/WebSites/Waynest/frontend"
          strip_components: 2
          rm: true

      - name: Setup frontend service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            # Install serve globally if not installed
            if ! command -v serve &> /dev/null; then
              echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S -p '' npm install -g serve
            fi
            # Open ports in firewall
            echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S -p '' ufw allow 9071/tcp comment 'Waynest Frontend' 2>/dev/null || true
            echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S -p '' ufw allow 9070/tcp comment 'Waynest Backend' 2>/dev/null || true
            # Unmask service if it exists and is masked
            echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S -p '' systemctl unmask waynest-frontend.service 2>/dev/null || true
            # Stop and disable old service if exists
            echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S -p '' systemctl stop waynest-frontend.service 2>/dev/null || true
            echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S -p '' systemctl disable waynest-frontend.service 2>/dev/null || true
            # Create systemd service file for frontend (using temp file)
            SERVE_PATH=$(which serve || echo /usr/bin/serve)
            cat > /tmp/waynest-frontend.service << EOFSERVICE
            [Unit]
            Description=Waynest Frontend Service
            After=network.target

            [Service]
            Type=simple
            User=abd
            WorkingDirectory=/home/abd/WebSites/Waynest/frontend
            Environment=NODE_ENV=production
            Environment=PORT=9071
            ExecStart=${SERVE_PATH} -s . -l tcp://0.0.0.0:9071
            Restart=always
            RestartSec=10

            [Install]
            WantedBy=multi-user.target
            EOFSERVICE
            echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S -p '' cp /tmp/waynest-frontend.service /etc/systemd/system/waynest-frontend.service
            rm -f /tmp/waynest-frontend.service
            echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S -p '' systemctl daemon-reload
            echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S -p '' systemctl enable waynest-frontend.service
            echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S -p '' systemctl restart waynest-frontend.service || echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S -p '' systemctl start waynest-frontend.service

      - name: Run deployment script
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            cd /home/abd/WebSites/Waynest
            if [ -f deploy.sh ]; then
              echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S -p '' bash deploy.sh
            else
              echo "Deploy script not found"
            fi

  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: waynest-be/package-lock.json

      - name: Install dependencies
        working-directory: ./waynest-be
        run: npm ci

      - name: Build backend
        working-directory: ./waynest-be
        run: npm run build

      - name: Clean backend directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            mkdir -p /home/abd/WebSites/Waynest/backend
            cd /home/abd/WebSites/Waynest/backend
            # Remove old files but keep node_modules if exists
            find . -maxdepth 1 ! -name '.' ! -name 'node_modules' -exec rm -rf {} + 2>/dev/null || true
            # Or remove everything except node_modules
            ls -A | grep -v node_modules | xargs rm -rf 2>/dev/null || true

      - name: Deploy backend to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: "waynest-be/dist/*,waynest-be/package.json,waynest-be/package-lock.json"
          target: "/home/abd/WebSites/Waynest/backend"
          strip_components: 1
          rm: false
          overwrite: true

      - name: Install backend dependencies
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            cd /home/abd/WebSites/Waynest/backend
            if [ -f package.json ]; then
              npm ci --production
              if [ -f .env.example ] && [ ! -f .env ]; then
                cp .env.example .env
                echo "⚠️  Created .env from .env.example - Please update it!"
              fi
              # Render .env on every deploy (overwrite)
