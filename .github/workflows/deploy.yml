name: Deploy to Linux Server

on:
  push:
    branches:
      - main  # أو master حسب فرعك
  workflow_dispatch:  # للتنفيذ اليدوي

jobs:
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: waynest-FE/package-lock.json

      - name: Install dependencies
        working-directory: ./waynest-FE
        run: npm ci

      - name: Build frontend
        working-directory: ./waynest-FE
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_GOOGLE_PLACES_KEY: ${{ secrets.VITE_GOOGLE_PLACES_KEY }}
        run: npm run build

      - name: Create directories
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            mkdir -p /home/abd/WebSites/Waynest/frontend
            mkdir -p /home/abd/WebSites/Waynest/backend
            mkdir -p /home/abd/WebSites/Waynest/logs
            mkdir -p /home/abd/WebSites/Waynest/backups

      - name: Deploy frontend to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: "waynest-FE/dist/*"
          target: "/home/abd/WebSites/Waynest/frontend"
          strip_components: 2
          rm: true

      - name: Run deployment script
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            cd /home/abd/WebSites/Waynest
            if [ -f deploy.sh ]; then
              echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S bash deploy.sh
            else
              echo "Deploy script not found, reloading nginx..."
              echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S systemctl reload nginx || echo "Nginx reload skipped"
            fi

  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: waynest-be/package-lock.json

      - name: Install dependencies
        working-directory: ./waynest-be
        run: npm ci

      - name: Build backend
        working-directory: ./waynest-be
        run: npm run build

      - name: Deploy backend to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: "waynest-be/dist/*,waynest-be/package.json,waynest-be/package-lock.json"
          target: "/home/abd/WebSites/Waynest/backend"
          strip_components: 1
          rm: true

      - name: Install backend dependencies
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            cd /home/abd/WebSites/Waynest/backend
            if [ -f package.json ]; then
              npm ci --production
              if [ -f .env.example ] && [ ! -f .env ]; then
                cp .env.example .env
                echo "⚠️  Created .env from .env.example - Please update it!"
              fi
            fi

      - name: Restart backend service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S systemctl daemon-reload
            echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S systemctl restart waynest-backend.service || echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S systemctl start waynest-backend.service || echo "Service not found, skipping"

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            sleep 5
            curl -f http://localhost:3001/health || echo "Health check failed, but continuing..."
